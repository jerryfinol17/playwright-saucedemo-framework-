[pytest]
pythonpath = .
asyncio_mode = auto
asyncio_default_test_loop_scope = function
addopts =
    --verbose
    --cov=pages
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml:coverage.xml
    --cov-fail-under=50
    --tb=short
    -q
markers =
    slow: mark test as slow
    smoke: mark test as smoke test